<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
  :root{
    --accent:#4dd7ff; --accent-2:#7f8cff; --green:#4ade80; --amber:#ffc857; --red:#f87171;
    --bg:#eef6ff; --card:rgba(255,255,255,.9); --ink:#112033; --muted:#5d718e; --line:rgba(75,111,160,.18);
    --shadow:0 24px 50px rgba(55,84,120,.16); --mono:'Segoe UI',ui-monospace,SFMono-Regular,Menlo,monospace;
    --font:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif;
    --body-grad-1:radial-gradient(960px 520px at 18% 0%, rgba(77,215,255,.22), transparent 60%);
    --body-grad-2:radial-gradient(780px 420px at 82% 10%, rgba(127,140,255,.18), transparent 58%);
    --body-grad-3:linear-gradient(180deg, #f4fbff, #e8f1fb 72%);
    --card-bg:linear-gradient(180deg, rgba(255,255,255,.96), rgba(241,247,255,.96));
    --card-edge:rgba(77,215,255,.22);
    --pill-bg:rgba(255,255,255,.72);
    --input-bg:rgba(255,255,255,.9);
    --panel-bg:linear-gradient(180deg, rgba(255,255,255,.95), rgba(241,247,255,.95));
    --cell-bg:rgba(255,255,255,.72);
    --logo-shell:linear-gradient(135deg, rgba(77,215,255,.2), rgba(127,140,255,.16));
    --logo-shell-border:rgba(255,255,255,.12);
    --logo-shell-shadow:0 18px 42px rgba(77,215,255,.16);
    --result-time:#10233c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--ink); min-height:100vh;
    background:var(--body-grad-1), var(--body-grad-2), var(--body-grad-3);
    display:flex; flex-direction:column; align-items:center; padding:24px 16px 40px;
    letter-spacing:0;
  }
  .topbar{width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:18px}
  .brand{display:flex; justify-content:center; align-items:center; width:100%; position:relative; padding:10px 0; min-height:138px}
  .brand::before{
    content:""; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:220px; height:132px; border-radius:999px; background:var(--logo-shell);
    border:1px solid var(--logo-shell-border); box-shadow:var(--logo-shell-shadow);
    pointer-events:none;
  }

  .brand img{height:118px; width:auto; max-width:min(100%,220px); object-fit:contain; padding:0; background:transparent; border:0; box-shadow:none; position:relative; z-index:0; opacity:0}
  .brand .bt{display:none}
  .tools{display:flex; gap:8px; flex-shrink:0}
  .lang-btn{
    min-width:110px; height:40px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--ink);
    border-radius:999px; cursor:pointer; font-family:var(--font); font-weight:800; font-size:.95rem;
    display:inline-flex; align-items:center; justify-content:center; transition:.18s ease;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  }
  .lang-btn:hover{border-color:rgba(77,215,255,.46); color:var(--accent); transform:translateY(-1px)}

  .clock{width:100%; max-width:520px; text-align:center; font-family:var(--mono); font-size:.92rem; color:var(--muted); margin-bottom:16px; letter-spacing:.08em; background:var(--pill-bg); border:1px solid var(--line); border-radius:999px; padding:12px 16px; backdrop-filter:blur(14px)}

  .card{
    width:100%; max-width:520px; background:var(--card-bg); border:1px solid var(--line);
    border-radius:30px; box-shadow:var(--shadow); padding:28px 22px 24px; margin-bottom:18px;
    backdrop-filter:blur(16px); position:relative; overflow:hidden;
  }
  .card::before{content:""; position:absolute; inset:0; background:radial-gradient(360px 140px at 50% 0%, rgba(77,215,255,.09), transparent 56%); pointer-events:none}
  .field-label{position:relative; font-size:1.12rem; font-weight:800; letter-spacing:0; color:var(--ink); margin-bottom:16px; display:block; text-align:center; line-height:1.9}
  .punch-row{display:flex; gap:10px; align-items:stretch; position:relative}
  input[type="time"]{
    flex:1; font-family:var(--mono); font-size:2rem; font-weight:800; text-align:center;
    padding:18px 14px; border:1.5px solid rgba(255,255,255,.1); border-radius:22px; background:var(--input-bg); color:var(--ink);
    direction:ltr; transition:.18s ease; box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }
  input[type="time"]:focus{outline:none; border-color:rgba(77,215,255,.58); box-shadow:0 0 0 4px rgba(77,215,255,.12)}

  .result{
    margin-top:20px; text-align:center; padding:26px 18px; border-radius:28px;
    background:linear-gradient(180deg, rgba(77,215,255,.09), rgba(255,255,255,.03)); border:1px solid var(--card-edge);
    position:relative;
  }
  .result .rlabel{font-size:.84rem; font-weight:800; letter-spacing:.16em; color:var(--muted)}
  .result .rtime{font-family:var(--mono); font-size:3.5rem; font-weight:900; line-height:1.05; color:var(--result-time); direction:ltr; margin-top:8px}
  .result .rtime .ap{font-size:1.1rem; font-weight:800; margin-inline-start:6px; vertical-align:middle}
  .result .rremain{font-size:.95rem; color:var(--muted); margin-top:12px; line-height:1.8}
  .result .rremain b{color:var(--ink)}
  .result{background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(235,244,255,.72))}
  .result .rlabel{color:#5d718e}
  .result .rtime .ap{color:#27425f}

  .status{display:inline-flex; align-items:center; gap:7px; margin-top:12px; padding:6px 14px; border-radius:999px; font-size:.8rem; font-weight:800; border:1px solid currentColor}
  .status.ok{color:var(--green); background:color-mix(in srgb,var(--green) 10%,transparent)}
  .status.early{color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 10%,transparent)}
  .status.late{color:var(--red); background:color-mix(in srgb,var(--red) 10%,transparent)}
  .status .dot{width:8px; height:8px; border-radius:50%; background:currentColor}

  .info{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:18px}
  .info .cell{background:var(--cell-bg); border-radius:20px; padding:14px 10px; text-align:center; border:1px solid rgba(255,255,255,.06)}
  .info .cell .k{font-size:.72rem; font-weight:800; letter-spacing:0; color:var(--muted)}
  .info .cell .v{font-family:var(--mono); font-size:.92rem; font-weight:700; margin-top:4px; direction:ltr}

  details.settings{width:100%; max-width:520px; background:var(--panel-bg); border:1px solid var(--line); border-radius:24px; overflow:hidden; backdrop-filter:blur(16px)}
  details.settings>summary{list-style:none; cursor:pointer; padding:16px 18px; font-weight:800; font-size:1rem; display:flex; align-items:center; justify-content:space-between}
  details.settings>summary::-webkit-details-marker{display:none}
  details.settings>summary .chev{transition:.2s; color:var(--muted)}
  details.settings[open]>summary .chev{transform:rotate(180deg)}
  .sbody{padding:4px 18px 18px; border-top:1px solid var(--line)}
  .srow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid color-mix(in srgb,var(--line) 70%,transparent)}
  .srow:last-child{border-bottom:0}
  .srow label{font-size:.84rem; font-weight:600; color:var(--ink)}
  .srow .sub{font-size:.72rem; color:var(--muted); margin-top:2px}
  .stepper{display:inline-flex; align-items:center; gap:6px}
  .stepper button{width:32px; height:32px; border:1px solid var(--line); background:var(--bg); color:var(--ink); border-radius:9px; font-size:1.1rem; font-weight:800; cursor:pointer; line-height:1}
  .stepper button:hover{border-color:var(--accent); color:var(--accent)}
  .stepper input{width:56px; height:32px; text-align:center; border:1px solid var(--line); border-radius:9px; background:var(--card); color:var(--ink); font-family:var(--mono); font-weight:700}
  .srow input[type="time"],.srow input[type="number"]{font-size:.95rem; padding:7px 10px; min-width:56px; max-width:136px; flex:none; border-radius:10px}
  .reset-btn{margin-top:14px; width:100%; padding:12px; border:1px dashed var(--line); background:transparent; color:var(--muted); border-radius:14px; font-weight:700; font-size:.88rem; cursor:pointer}
  .reset-btn:hover{border-color:var(--red); color:var(--red)}
  footer{display:none}

  html[dir="rtl"] body{font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif}
  html[dir="rtl"] .field-label, html[dir="rtl"] .result .rremain, html[dir="rtl"] .srow label, html[dir="rtl"] .srow .sub{letter-spacing:0}
  html[dir="rtl"] .info .cell .v, html[dir="rtl"] .result .rtime, html[dir="rtl"] .clock{font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif}
  html[dir="rtl"] .info .cell .v, html[dir="rtl"] .result .rremain b{direction:rtl}
  html[dir="rtl"] .result .rremain{word-spacing:.14em}
  @media(max-width:430px){ .result .rtime{font-size:2.7rem} .brand img{height:100px} .info{grid-template-columns:1fr} .info .cell .v{font-size:.92rem} .card, details.settings, .clock, .topbar{max-width:100%} }
</style>

          <button onclick="step('rM',-5)">&minus;</button><input id="rM" type="number" min="0" max="59" step="5" value="45" oninput="saveAndCalc()"><button onclick="step('rM',5)">+</button><button onclick="step('rH',1)">+</button>

<script>
var DEFAULTS={rH:7,rM:45,schedStart:"06:30",flex:120,punchIn:"06:30",lang:"en"};
function $(id){return document.getElementById(id);}
var S=load();

var I18N={
  en:{appTitle:"Attendance Calculator",appSub:"Department of Town Planning & Survey",punchInLabel:"Enter your punch-in time to know when you can leave",now:"Now",
    leaveAt:"You can leave at",required:"Required",allowedIn:"Check-in",allowedOut:"Check-out",settings:"Settings",
    requiredDuration:"Required duration",requiredSub:"Total work hours per day",schedStart:"Schedule start",
    schedStartSub:"Official day start time",flexWindow:"Flex window",flexWindowSub:"Grace minutes after start",
    reset:"Reset to defaults",footer:"Manual attendance calculator - enter your check-in time to see when you can leave.",
    onTime:"On time",earlyBy:"min early",lateBy:"min late",remaining:"left until you can leave",canLeave:"You can leave now",h:"h",m:"m"},
  ar:{appTitle:"حاسبة الدوام",appSub:"إدارة تخطيط المدن والمساحة",punchInLabel:"أدخل وقت دخولك لمعرفة وقت مغادرتك",now:"الآن",
    leaveAt:"يمكنك المغادرة في",required:"المطلوب",allowedIn:"الدخول",allowedOut:"الخروج",settings:"الإعدادات",
    requiredDuration:"مدة الدوام المطلوبة",requiredSub:"إجمالي ساعات العمل اليومية",schedStart:"بداية الدوام",
    schedStartSub:"وقت بدء الدوام الرسمي",flexWindow:"فترة السماح",flexWindowSub:"دقائق السماح بعد البداية",
    reset:"إعادة التعيين",footer:"حاسبة دوام يدوية - أدخل وقت دخولك لمعرفة وقت مغادرتك.",
    onTime:"ضمن الوقت",earlyBy:"دقيقة مبكر",lateBy:"دقيقة متأخر",remaining:"متبقي حتى يمكنك المغادرة",canLeave:"يمكنك المغادرة الآن",h:"س",m:"د"}};
function t(k){return (I18N[S.lang]||I18N.en)[k]||k;}

function cloneDefaults(){
  return {rH:DEFAULTS.rH,rM:DEFAULTS.rM,schedStart:DEFAULTS.schedStart,flex:DEFAULTS.flex,punchIn:DEFAULTS.punchIn,lang:DEFAULTS.lang};
}
function mergeSettings(base,extra){
  var out={rH:base.rH,rM:base.rM,schedStart:base.schedStart,flex:base.flex,punchIn:base.punchIn,lang:base.lang};
  if(extra && typeof extra==="object"){
    if(extra.rH!==undefined){out.rH=extra.rH;}
    if(extra.rM!==undefined){out.rM=extra.rM;}
    if(extra.schedStart!==undefined){out.schedStart=extra.schedStart;}
    if(extra.flex!==undefined){out.flex=extra.flex;}
    if(extra.punchIn!==undefined){out.punchIn=extra.punchIn;}
    if(extra.lang!==undefined){out.lang=extra.lang;}
  }
  return out;
}
function load(){try{return mergeSettings(cloneDefaults(),JSON.parse(localStorage.getItem("ppv2")||"{}"));}catch(e){return cloneDefaults();}}
function save(){try{localStorage.setItem("ppv2",JSON.stringify(S));}catch(e){}}
function setText(id,value){var el=$(id); if(el){el.textContent=value;}}
function setHtml(id,value){var el=$(id); if(el){el.innerHTML=value;}}
function reportError(err){
  var wrap=$("statusWrap");
  if(wrap){wrap.innerHTML='<span class="status late"><span class="dot"></span>Calculation error</span>';}
  if(window.console && console.error){console.error(err);}
}

function pad(n){
  var s=String(n);
  return s.length<2?"0"+s:s;
}
function normalizeDigits(v){
  var s=String(v==null?"":v);
  var ar="٠١٢٣٤٥٦٧٨٩";
  var fa="۰۱۲۳۴۵۶۷۸۹";
  var out="";
  for(var i=0;i<s.length;i++){
    var ch=s.charAt(i);
    var ai=ar.indexOf(ch);
    var fi=fa.indexOf(ch);
    if(ai>-1){out+=String(ai);}
    else if(fi>-1){out+=String(fi);}
    else{out+=ch;}
  }
  return out;
}
function cleanTimeValue(v,fallback){
  var s=normalizeDigits(v).replace(/\s+/g,"").replace(/[\.،]/g,":");
  var h=0,m=0,match;
  if(/^\d{1,2}:\d{1,2}$/.test(s)){
    match=s.split(":");
    h=parseInt(match[0],10);
    m=parseInt(match[1],10);
  }else if(/^\d{3,4}$/.test(s)){
    if(s.length===3){h=parseInt(s.charAt(0),10); m=parseInt(s.slice(1),10);}
    else {h=parseInt(s.slice(0,2),10); m=parseInt(s.slice(2),10);}
  }else if(/^\d{1,2}$/.test(s)){
    h=parseInt(s,10); m=0;
  }else{
    return fallback || DEFAULTS.punchIn;
  }
  if(isNaN(h)||isNaN(m)||h<0||h>23||m<0||m>59){return fallback || DEFAULTS.punchIn;}
  return pad(h)+":"+pad(m);
}
function toMin(hhmm){
  var parts=cleanTimeValue(hhmm,"00:00").split(":");
  var a=Number(parts[0]);
  var b=Number(parts[1]);
  return (a||0)*60+(b||0);
}
function fmt12(totalMin){
  var mm=((totalMin%1440)+1440)%1440; var h=Math.floor(mm/60),m=mm%60;
  var ap=h<12?"AM":"PM"; var h12=h%12; if(h12===0)h12=12;
  return {t:h12+":"+pad(m),ap:ap};
}
function fmt24(totalMin){var mm=((totalMin%1440)+1440)%1440;return pad(Math.floor(mm/60))+":"+pad(mm%60);}
function formatDuration(totalMin){
  var hours=Math.floor(totalMin/60);
  var mins=Math.abs(totalMin%60);
  if(S.lang==="ar"){return hours+" "+t("h")+" "+pad(mins)+" "+t("m");}
  return hours+t("h")+" "+pad(mins)+t("m");
}

function reqMin(){return (Number(S.rH)||0)*60+(Number(S.rM)||0);}

function calc(){
  try{
    var punchEl=$("punchIn");
    var raw=punchEl ? punchEl.value : S.punchIn;
    var punch=cleanTimeValue(raw,S.punchIn||DEFAULTS.punchIn);
    S.punchIn=punch;
    save();

    var pin=toMin(punch);
    var start=toMin(S.schedStart);
    var flex=Number(S.flex)||0;
    var req=reqMin();
    var effStart=pin<start?start:pin;
    var leave=effStart+req;
    var lv=fmt12(leave);
    setHtml("leaveTime",lv.t+'<span class="ap">'+lv.ap+"</span>");

    setText("reqVal",formatDuration(req));
    setText("inWin",fmt24(start)+" - "+fmt24(start+flex));
    setText("outWin",fmt24(start+req)+" - "+fmt24(start+req+flex));

    var diff=pin-start; var cls,txt;
    if(diff<0){cls="early";txt=Math.abs(diff)+" "+t("earlyBy");}
    else if(diff>flex){cls="late";txt=(diff-flex)+" "+t("lateBy");}
    else{cls="ok";txt=t("onTime");}
    setHtml("statusWrap",'<span class="status '+cls+'"><span class="dot"></span>'+txt+"</span>");

    var now=new Date(); var nowMin=now.getHours()*60+now.getMinutes();
    var left=leave-nowMin;
    if(left>0){ setHtml("remain","<b>"+formatDuration(left)+"</b> "+t("remaining")); }
    else{ setHtml("remain",t("canLeave")); }
  }catch(e){reportError(e);}
}

function step(id,d){var el=$(id);var v=(parseInt(el.value,10)||0)+d;
  if(id==="rH")v=Math.max(0,Math.min(24,v)); if(id==="rM"){if(v<0)v=55;if(v>59)v=0;} if(id==="flex")v=Math.max(0,Math.min(240,v));
  el.value=v;saveAndCalc();}
function normalizeField(id,fallback){
  var el=$(id);
  if(!el){return;}
  el.value=cleanTimeValue(el.value,fallback);
}
function saveAndCalc(){
  S.rH=Number(($("rH")||{}).value)||0;
  S.rM=Number(($("rM")||{}).value)||0;
  S.schedStart=cleanTimeValue(($("schedStart")||{}).value,"06:30");
  S.flex=Number(($("flex")||{}).value)||0;
  save();
  calc();
}
function applyLang(){
  try{
    document.documentElement.lang=S.lang; document.documentElement.dir=S.lang==="ar"?"rtl":"ltr";
    $("langBtn").textContent=S.lang==="ar"?"English":"العربية";
    var i18nNodes=document.querySelectorAll("[data-i18n]");
    for(var i=0;i<i18nNodes.length;i++){
      var el=i18nNodes[i];
      el.textContent=t(el.getAttribute("data-i18n"));
    }
    var punchLabel=document.querySelector('[data-i18n="punchInLabel"]');
    if(punchLabel){punchLabel.textContent=S.lang==="ar"?"أدخل وقت دخولك لمعرفة وقت مغادرتك":"Enter your punch-in time to know when you can leave";}
    calc(); save();
  }catch(e){reportError(e);}
}
function toggleLang(){S.lang=S.lang==="ar"?"en":"ar";applyLang();}

function resetDefaults(){var currentLang=S.lang;S=cloneDefaults();S.lang=currentLang||DEFAULTS.lang;save();
  $("rH").value=DEFAULTS.rH;$("rM").value=DEFAULTS.rM;$("schedStart").value=DEFAULTS.schedStart;$("flex").value=DEFAULTS.flex;$("punchIn").value=DEFAULTS.punchIn;calc();}

function tickClock(){
  try{
    var d=new Date();var f=fmt12(d.getHours()*60+d.getMinutes());
    setText("liveClock",f.t+":"+pad(d.getSeconds())+" "+f.ap);
  }catch(e){}
}
function attach(id,fn){
  var el=$(id); if(!el){return;}
  var events=["input","change","keyup","blur","touchend"];
  for(var i=0;i<events.length;i++){
    if(el.addEventListener){el.addEventListener(events[i],fn,false);}
  }
}
function isIosDevice(){
  var ua=navigator.userAgent||navigator.vendor||window.opera||"";
  return /iPad|iPhone|iPod/.test(ua) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
}
function enableIosTimeFallback(){
  if(!isIosDevice()){return;}
  var ids=["punchIn","schedStart"];
  for(var i=0;i<ids.length;i++){
    var el=$(ids[i]);
    if(!el){continue;}
    try{el.type="text";}catch(e){}
    el.setAttribute("inputmode","numeric");
    el.setAttribute("placeholder","HH:MM");
    el.setAttribute("autocomplete","off");
    el.setAttribute("spellcheck","false");
    el.value=cleanTimeValue(el.value||S[ids[i]]||DEFAULTS[ids[i]],DEFAULTS[ids[i]]);
  }
}
function initPunchPro(){
  try{
    if($("rH")){$("rH").value=S.rH;}
    if($("rM")){$("rM").value=S.rM;}
    if($("schedStart")){$("schedStart").value=S.schedStart;}
    if($("flex")){$("flex").value=S.flex;}
    if($("punchIn")){$("punchIn").value=S.punchIn;}
    enableIosTimeFallback();

    attach("punchIn",function(){calc();});
    attach("schedStart",function(){saveAndCalc();});
    attach("rH",function(){saveAndCalc();});
    attach("rM",function(){saveAndCalc();});
    attach("flex",function(){saveAndCalc();});
    var p=$("punchIn");
    if(p && p.addEventListener){p.addEventListener("blur",function(){normalizeField("punchIn",S.punchIn||DEFAULTS.punchIn); calc();},false);}
    var st=$("schedStart");
    if(st && st.addEventListener){st.addEventListener("blur",function(){normalizeField("schedStart",S.schedStart||DEFAULTS.schedStart); saveAndCalc();},false);}

    applyLang();
    tickClock();
    calc();
    setTimeout(calc,0);
    setTimeout(calc,100);
    setTimeout(calc,500);
    setInterval(tickClock,1000);
    setInterval(calc,30000);
  }catch(e){reportError(e);}
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",initPunchPro,false);
}else{
  initPunchPro();
}
if(window.addEventListener){window.addEventListener("load",function(){calc();setTimeout(calc,100);},false);}
</script>
